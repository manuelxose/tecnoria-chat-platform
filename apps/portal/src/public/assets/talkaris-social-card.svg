<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Talkaris social card</title>
  <desc id="desc">Talkaris conversational AI platform for websites, SaaS and support operations.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#081424" />
      <stop offset="58%" stop-color="#11314b" />
      <stop offset="100%" stop-color="#18423f" />
    </linearGradient>
    <linearGradient id="teal" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#59d0b3" />
      <stop offset="100%" stop-color="#1c7a67" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d8a9" />
      <stop offset="100%" stop-color="#bc8d46" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="56" />
    </filter>
  </defs>
  <rect width="1200" height="630" rx="40" fill="url(#bg)" />
  <circle cx="150" cy="110" r="130" fill="#59d0b3" opacity="0.16" filter="url(#blur)" />
  <circle cx="1030" cy="520" r="160" fill="#f0d8a9" opacity="0.14" filter="url(#blur)" />

  <rect x="58" y="54" width="1084" height="522" rx="34" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" />
  <rect x="86" y="86" width="1028" height="84" rx="26" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" />

  <rect x="118" y="210" width="526" height="292" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" />
  <rect x="688" y="210" width="394" height="136" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" />
  <rect x="688" y="366" width="394" height="136" rx="28" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" />

  <rect x="118" y="210" width="110" height="110" rx="28" fill="url(#teal)" />
  <text x="146" y="282" fill="#ffffff" font-size="58" font-family="Outfit, Arial, sans-serif" font-weight="800">T</text>
  <text x="264" y="278" fill="#ffffff" font-size="62" font-family="Outfit, Arial, sans-serif" font-weight="700">Talkaris</text>
  <text x="264" y="330" fill="rgba(255,255,255,0.86)" font-size="22" font-family="Manrope, Arial, sans-serif">
    Conversational AI platform for websites, SaaS and support operations
  </text>

  <rect x="148" y="376" width="438" height="82" rx="22" fill="url(#gold)" opacity="0.92" />
  <text x="176" y="424" fill="#1a1a1a" font-size="24" font-family="Outfit, Arial, sans-serif" font-weight="700">
    Embeddable widget, governed knowledge and multi-tenant operations
  </text>

  <text x="720" y="258" fill="rgba(255,255,255,0.72)" font-size="16" font-family="Manrope, Arial, sans-serif" letter-spacing="3">PLATFORM</text>
  <text x="720" y="292" fill="#ffffff" font-size="26" font-family="Outfit, Arial, sans-serif" font-weight="700">Sales, support and onboarding</text>
  <rect x="720" y="316" width="220" height="10" rx="5" fill="#59d0b3" opacity="0.9" />

  <text x="720" y="414" fill="rgba(255,255,255,0.72)" font-size="16" font-family="Manrope, Arial, sans-serif" letter-spacing="3">CONTROL</text>
  <text x="720" y="448" fill="#ffffff" font-size="26" font-family="Outfit, Arial, sans-serif" font-weight="700">Analytics, leads and governance</text>
  <rect x="720" y="472" width="250" height="10" rx="5" fill="#f0d8a9" opacity="0.9" />
</svg>
