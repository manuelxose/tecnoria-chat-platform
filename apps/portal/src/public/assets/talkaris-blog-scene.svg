<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 960" role="img" aria-labelledby="title desc">
  <title id="title">Talkaris editorial scene</title>
  <desc id="desc">Editorial style brand visual for Talkaris blog and content surfaces.</desc>
  <defs>
    <linearGradient id="blogBg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#071220" />
      <stop offset="55%" stop-color="#112f42" />
      <stop offset="100%" stop-color="#18423f" />
    </linearGradient>
    <linearGradient id="blogTeal" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#59d0b3" />
      <stop offset="100%" stop-color="#1c7a67" />
    </linearGradient>
    <linearGradient id="blogGold" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d8a9" />
      <stop offset="100%" stop-color="#bc8d46" />
    </linearGradient>
    <filter id="blogBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="72" />
    </filter>
  </defs>

  <rect width="1400" height="960" rx="64" fill="url(#blogBg)" />
  <circle cx="236" cy="178" r="186" fill="#59d0b3" opacity="0.16" filter="url(#blogBlur)" />
  <circle cx="1120" cy="170" r="170" fill="#f0d8a9" opacity="0.14" filter="url(#blogBlur)" />
