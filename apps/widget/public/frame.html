<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Widget</title>
    <style>
      :root {
        color-scheme: light;
        --accent: #00c2a8;
        --surface: #081220;
        --surface-soft: #0f1b2d;
        --panel: #ffffff;
        --panel-soft: #f3f7fb;
        --text: #0f1724;
        --muted: #5b6678;
        --border: rgba(15, 23, 36, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: transparent;
      }

      .shell {
        height: 100vh;
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
      }

      .widget {
        width: 100%;
        height: 100%;
        border-radius: 28px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: 0 24px 64px rgba(7, 15, 27, 0.24);
      }

      .launcher {
        margin: auto;
        width: 92px;
        height: 92px;
        border-radius: 24px;
        border: 0;
        background: linear-gradient(135deg, var(--accent), #2bd4a8);
        color: #021310;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 22px 48px rgba(0, 194, 168, 0.35);
      }

      .hidden {
        display: none !important;
      }

      .header {
        padding: 18px 18px 14px;
        background: linear-gradient(180deg, var(--surface), var(--surface-soft));
        color: #f7fbff;
      }

      .header__top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .header h1 {
        margin: 0 0 6px;
        font-size: 1.05rem;
      }

      .header p {
        margin: 0;
        font-size: 0.88rem;
        color: rgba(247, 251, 255, 0.78);
      }

      .icon-button {
        border: 0;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
        width: 36px;
        height: 36px;
        cursor: pointer;
      }

      .body {
        flex: 1;
        min-height: 0;
        background: radial-gradient(circle at top, rgba(0, 194, 168, 0.08), transparent 35%), var(--panel-soft);
        display: flex;
        flex-direction: column;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .bubble {
        max-width: 88%;
        padding: 12px 14px;
        border-radius: 18px;
        font-size: 0.94rem;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .bubble.bot {
        background: #ffffff;
        color: var(--text);
        border: 1px solid var(--border);
        align-self: flex-start;
      }

      .bubble.user {
        background: linear-gradient(135deg, var(--accent), #9ef2dd);
        color: #04221b;
        align-self: flex-end;
      }

      .citations,
      .starters,
      .lead-card {
        padding: 0 16px 16px;
      }

      .citation,
      .starter,
      .lead-card button,
      .form button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 14px;
        border: 1px solid rgba(0, 194, 168, 0.18);
        background: #ffffff;
        padding: 10px 12px;
        text-decoration: none;
        color: var(--text);
        font-size: 0.86rem;
        cursor: pointer;
      }

      .starters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .lead-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .lead-card__actions,
      .form__row {
        display: flex;
        gap: 8px;
      }

      .lead-card__actions a {
        flex: 1;
        text-align: center;
        text-decoration: none;
        border-radius: 14px;
        padding: 10px 12px;
        background: var(--accent);
        color: #04221b;
        font-weight: 600;
      }

      .lead-card__actions button {
        flex: 1;
      }

      .form {
        padding: 0 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .form input,
      .form textarea {
        width: 100%;
        border: 1px solid rgba(15, 23, 36, 0.12);
        border-radius: 14px;
        padding: 11px 12px;
        font: inherit;
      }

      .composer {
        padding: 12px 16px 16px;
        display: grid;
        gap: 10px;
        background: #ffffff;
        border-top: 1px solid var(--border);
      }

      .composer__row {
        display: flex;
        gap: 10px;
      }

      .composer textarea {
        flex: 1;
        min-height: 54px;
        max-height: 120px;
        resize: vertical;
        border-radius: 16px;
        border: 1px solid rgba(15, 23, 36, 0.12);
        padding: 12px 14px;
        font: inherit;
      }

      .composer textarea:disabled,
      .composer button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .composer button,
      .form button {
        background: var(--accent);
        color: #03201b;
        border: 0;
        font-weight: 700;
      }

      .status {
        font-size: 0.82rem;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .widget {
          border-radius: 24px;
        }

        .bubble {
          max-width: 94%;
        }

        .lead-card__actions,
        .form__row,
        .composer__row {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <button id="launcher" class="launcher" type="button">Chat</button>
      <section id="widget" class="widget hidden" aria-live="polite">
        <header class="header">
          <div class="header__top">
            <div>
              <h1 id="bot-name">Asistente</h1>
              <p id="bot-copy">Consultas sobre la plataforma, integraciones y acceso.</p>
            </div>
            <button id="close" class="icon-button" type="button" aria-label="Cerrar">X</button>
          </div>
        </header>
        <div class="body">
          <div id="messages" class="messages"></div>
          <div id="starters" class="starters"></div>
          <div id="citations" class="citations hidden"></div>
          <div id="lead-card" class="lead-card hidden">
            <strong>Quieres llevar esto a una demo o a una conversación comercial?</strong>
            <div class="lead-card__actions">
              <a id="primary-cta" href="/solicitar-demo" target="_top" rel="noopener">Solicitar demo</a>
              <button id="show-form" type="button">Dejar datos</button>
            </div>
          </div>
          <form id="lead-form" class="form hidden">
            <div class="form__row">
              <input id="lead-name" type="text" placeholder="Nombre" required />
              <input id="lead-email" type="email" placeholder="Email" required />
            </div>
            <input id="lead-company" type="text" placeholder="Empresa (opcional)" />
            <textarea id="lead-need" placeholder="Que necesitas y en que contexto" rows="3" required></textarea>
            <button type="submit">Enviar</button>
          </form>
        </div>
        <div class="composer">
          <div class="status" id="status">Ready to help.</div>
          <div class="composer__row">
            <textarea id="composer" placeholder="Ask about the platform, integrations, governance or demo access."></textarea>
            <button id="send" type="button">Enviar</button>
          </div>
        </div>
      </section>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const apiBase = params.get("apiBase");
      const siteKey = params.get("siteKey");
      const parentOrigin = params.get("origin") || "*";
      const entryContext = params.get("entryContext") || "";
      const brandLabel = params.get("brandLabel") || "la plataforma";
      const sourceSite = params.get("sourceSite") || parentOrigin;
      const contactUrl = params.get("contactUrl");
      const isMarketingEn = entryContext === "marketing-en";
      const isMarketingEs = entryContext === "marketing-es";
      const isMarketingContext = isMarketingEn || isMarketingEs || entryContext === "auctorio-marketing";
      const fallbackContactUrl = contactUrl
        || "https://talkaris.com/solicitar-demo";
      const defaultBotCopy = isMarketingEn
        ? "Assistant for the platform, integrations and commercial contact."
        : isMarketingEs
          ? "Asistente sobre la plataforma, sus integraciones y el acceso comercial."
          : "Consultas sobre la plataforma, integraciones y acceso.";
      const defaultWelcomeMessage = isMarketingEn
        ? `Hello. I am the assistant for ${brandLabel}. I can help you understand the platform, its integrations and how to request a demo.`
        : isMarketingEs
          ? `Hola. Soy el asistente de ${brandLabel}. Puedo ayudarte a entender la plataforma, sus integraciones y cómo solicitar una demo.`
          : "Hola. ¿En qué puedo ayudarte?";
      const starterQuestions = isMarketingEn
        ? [
          "What does Talkaris do exactly",
          "How does the widget integrate into a product",
          "How does multi-tenant governance work",
          "I want a demo or to speak with sales",
        ]
        : isMarketingEs
          ? [
            "Qué hace Talkaris exactamente",
            "Cómo se integra el widget en un producto",
            "Cómo funciona el gobierno multi-tenant",
            "Quiero una demo o hablar con ventas",
          ]
          : [
            "Qué hace Talkaris exactamente",
            "Cómo se integra en otras aplicaciones",
            "Cómo se administra un tenant",
            "Quiero una demo o hablar con ventas",
          ];

      let expanded = false;
      let config = null;
      let conversationId = null;
      let lastUserMessage = "";
      let degradedMode = false;

      const launcher = document.getElementById("launcher");
      const widget = document.getElementById("widget");
      const closeButton = document.getElementById("close");
      const messages = document.getElementById("messages");
      const citations = document.getElementById("citations");
      const starters = document.getElementById("starters");
      const status = document.getElementById("status");
      const composer = document.getElementById("composer");
      const sendButton = document.getElementById("send");
      const leadCard = document.getElementById("lead-card");
      const primaryCta = document.getElementById("primary-cta");
      const showFormButton = document.getElementById("show-form");
      const leadForm = document.getElementById("lead-form");
      const botName = document.getElementById("bot-name");
      const botCopy = document.getElementById("bot-copy");

      function notifyParent() {
        window.parent.postMessage(
          { type: "talkaris-chat:toggle", expanded },
          parentOrigin === "*" ? "*" : parentOrigin
        );
        window.parent.postMessage(
          { type: "tecnoria-chat:toggle", expanded },
          parentOrigin === "*" ? "*" : parentOrigin
        );
      }

      function setExpanded(nextValue) {
        expanded = nextValue;
        launcher.classList.toggle("hidden", expanded);
        widget.classList.toggle("hidden", !expanded);
        notifyParent();
      }

      function addBubble(role, text) {
        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        bubble.textContent = text;
        messages.appendChild(bubble);
        messages.scrollTop = messages.scrollHeight;
      }

      function setStatus(text) {
        status.textContent = text;
      }

      function setComposerEnabled(enabled) {
        composer.disabled = !enabled;
        sendButton.disabled = !enabled;
      }

      function setLeadCta(label, url, allowLeadForm) {
        primaryCta.textContent = label;
        primaryCta.href = url;
        leadCard.classList.remove("hidden");
        showFormButton.classList.toggle("hidden", !allowLeadForm);
        if (!allowLeadForm) {
          leadForm.classList.add("hidden");
        }
      }

      function clearTransientBlocks() {
        starters.innerHTML = "";
        citations.innerHTML = "";
        citations.classList.add("hidden");
      }

      function enableDegradedMode(message) {
        if (degradedMode) {
          setStatus("Asistente no disponible.");
          return;
        }

        degradedMode = true;
        clearTransientBlocks();
        setComposerEnabled(false);
        setLeadCta("Request demo", fallbackContactUrl, false);
        botName.textContent = brandLabel;
        botCopy.textContent = defaultBotCopy;
        addBubble("bot", message);
        setStatus("Assistant unavailable.");
      }

      function ensureConfigured() {
        if (!apiBase || !siteKey) {
          throw new Error("Widget configuration is incomplete.");
        }
      }

      async function fetchJson(url) {
        const response = await fetch(url);
        const text = await response.text();
        const body = text ? JSON.parse(text) : null;
        if (!response.ok) {
          throw new Error(body?.message || `${response.status} ${response.statusText}`);
        }
        return body;
      }

      async function postJson(path, payload) {
        ensureConfigured();
        const response = await fetch(`${apiBase}${path}`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        const text = await response.text();
        if (!response.ok) {
          let message = `${response.status} ${response.statusText}`;
          if (text) {
            try {
              const body = JSON.parse(text);
              message = body?.message || body?.code || message;
            } catch {
              message = text;
            }
          }
          throw new Error(message);
        }
        return text;
      }

      async function ensureSession() {
        if (conversationId || degradedMode) {
          return;
        }

        ensureConfigured();
        const text = await postJson("/v1/widget/sessions", {
          siteKey,
          origin: parentOrigin,
        });
        const data = text ? JSON.parse(text) : null;
        conversationId = data?.conversationId || null;
        if (!conversationId) {
          throw new Error("Session could not be created.");
        }
      }

      async function logEvent(eventType, payload) {
        if (!conversationId || degradedMode) {
          return;
        }

        try {
          await postJson("/v1/widget/events", {
            conversationId,
            eventType,
            payload,
          });
        } catch {
          // no-op
        }
      }

      function renderCitations(items) {
        citations.innerHTML = "";
        if (!items?.length) {
          citations.classList.add("hidden");
          return;
        }

        citations.classList.remove("hidden");
        items.forEach((item) => {
          const link = document.createElement("a");
          link.className = "citation";
          link.href = item.url;
          link.target = "_top";
          link.rel = "noopener";
          link.textContent = item.title;
          link.addEventListener("click", () => logEvent("citation_clicked", { url: item.url }));
          citations.appendChild(link);
        });
      }

      function maybeShowLead(answer) {
        if (!answer?.cta) {
          leadCard.classList.add("hidden");
          leadForm.classList.add("hidden");
          return;
        }

        setLeadCta(answer.cta.label, answer.cta.url, true);
      }

      async function sendMessage(message) {
        const trimmed = message.trim();
        if (!trimmed || degradedMode) {
          return;
        }

        lastUserMessage = trimmed;
        addBubble("user", trimmed);
        composer.value = "";
        setStatus("Buscando en fuentes autorizadas...");

        try {
          await ensureSession();
          const text = await postJson("/v1/widget/messages", {
            conversationId,
            message: trimmed,
          });
          const payloadLine = text
            .split("\n")
            .find((line) => line.startsWith("data: "));
          const data = payloadLine ? JSON.parse(payloadLine.slice(6)) : null;
          const answer = data?.payload;

          addBubble("bot", answer?.message || "No he podido generar una respuesta valida.");
          renderCitations(answer?.citations || []);
          maybeShowLead(answer || {});
          setStatus(
            answer?.usedFallback
              ? "He derivado a fallback seguro."
              : "Respuesta generada con contexto autorizado."
          );
        } catch (error) {
          addBubble(
            "bot",
            "I cannot answer from the authorised sources right now. You can continue through the form or request a demo."
          );
          setLeadCta("Request demo", fallbackContactUrl, false);
          renderCitations([]);
          setStatus(error instanceof Error ? error.message : "Assistant unavailable.");
        }
      }

      async function submitLead(event) {
        event.preventDefault();
        if (degradedMode) {
          setStatus("Usa el CTA principal para contactar.");
          return;
        }

        try {
          await ensureSession();
          await postJson("/v1/widget/leads", {
            conversationId,
            name: document.getElementById("lead-name").value,
            email: document.getElementById("lead-email").value,
            company: document.getElementById("lead-company").value,
            need: document.getElementById("lead-need").value || lastUserMessage,
          });
          leadForm.classList.add("hidden");
          addBubble(
            "bot",
            "He registrado tu solicitud. El equipo puede revisar el contexto y seguir por el canal adecuado."
          );
          setStatus("Lead enviado.");
        } catch (error) {
          setStatus(
            error instanceof Error
              ? error.message
              : "No he podido enviar los datos. Puedes usar el CTA principal como alternativa."
          );
        }
      }

      async function init() {
        if (config || degradedMode) {
          return;
        }

        ensureConfigured();
        const nextConfig = await fetchJson(
          `${apiBase}/v1/widget/config/${encodeURIComponent(siteKey)}`
        );

        config = nextConfig;
        document.documentElement.style.setProperty(
          "--accent",
          config.theme?.accentColor || "#00c2a8"
        );
        document.documentElement.style.setProperty(
          "--surface",
          config.theme?.surfaceColor || "#081220"
        );
        const resolvedBotName = isMarketingContext
          ? brandLabel
          : (config.botName || brandLabel || "Asistente");
        const resolvedBotCopy = isMarketingContext
          ? defaultBotCopy
          : (config.welcomeMessage || defaultBotCopy);
        const resolvedWelcomeMessage = isMarketingContext
          ? defaultWelcomeMessage
          : (config.welcomeMessage || defaultWelcomeMessage);

        botName.textContent = resolvedBotName;
        botCopy.textContent = resolvedBotCopy;
        addBubble("bot", resolvedWelcomeMessage);
        starters.innerHTML = "";
        starterQuestions.forEach((question) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "starter";
          button.textContent = question;
          button.addEventListener("click", () => sendMessage(question));
          starters.appendChild(button);
        });
        primaryCta.textContent = config.cta?.primaryLabel || "Request demo";
        primaryCta.href = config.cta?.primaryUrl || fallbackContactUrl;
        leadCard.classList.add("hidden");
        leadForm.classList.add("hidden");
        primaryCta.addEventListener("click", () => {
          logEvent("cta_clicked", { url: primaryCta.href });
        });
      }

      launcher.addEventListener("click", async () => {
        setExpanded(true);

        try {
          if (!config && !degradedMode) {
            await init();
          }
          if (!degradedMode) {
            await ensureSession();
          }
        } catch {
          enableDegradedMode(
            "The assistant is not available right now. You can request a demo and the team will continue from there."
          );
        }
      });
      closeButton.addEventListener("click", () => setExpanded(false));
      sendButton.addEventListener("click", () => sendMessage(composer.value));
      composer.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage(composer.value);
        }
      });
      showFormButton.addEventListener("click", () => {
        if (degradedMode) {
          return;
        }
        leadForm.classList.toggle("hidden");
        document.getElementById("lead-need").value = lastUserMessage;
      });
      leadForm.addEventListener("submit", submitLead);
      launcher.textContent = isMarketingContext ? "AI" : "Chat";
      botName.textContent = brandLabel;
      botCopy.textContent = defaultBotCopy;
      primaryCta.textContent = "Request demo";
      primaryCta.href = fallbackContactUrl;
      leadCard.classList.add("hidden");
      setComposerEnabled(true);
    </script>
  </body>
</html>
