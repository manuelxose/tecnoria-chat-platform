<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talkaris Widget</title>
    <style>
      :root {
        color-scheme: dark;
        --accent: #6366f1;
        --accent-alt: #8b5cf6;
        --accent-text: #ffffff;
        --surface: #0f172a;
        --surface-soft: rgba(30, 41, 59, 0.92);
        --panel: rgba(15, 23, 42, 0.9);
        --panel-soft: rgba(30, 41, 59, 0.76);
        --text: #f8fafc;
        --muted: #94a3b8;
        --border: rgba(248, 250, 252, 0.1);
        --border-strong: rgba(248, 250, 252, 0.16);
        --shadow: 0 24px 64px rgba(2, 6, 23, 0.42);
        --scrollbar-track: rgba(15, 23, 42, 0.4);
        --scrollbar-thumb: rgba(148, 163, 184, 0.4);
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: transparent;
      }

      body {
        margin: 0;
        font-family: "Manrope", "Segoe UI", sans-serif;
        background: transparent;
        color: var(--text);
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }

      .shell {
        position: relative;
        width: 100%;
        height: 100vh;
      }

      .shell[data-preview="widget"] {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 14px;
      }

      .shell[data-preview="launcher"] {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
      }

      .shell[data-preview="runtime"] .launcher {
        position: absolute;
        right: 0;
        bottom: 0;
        margin: 0;
        width: 100% !important;
        height: 100% !important;
        min-width: 0;
        min-height: 0;
        max-width: none;
      }

      .shell[data-preview="launcher"] .launcher {
        position: static;
        margin: 0 auto;
      }

      .shell[data-preview="widget"] .widget {
        width: min(100%, 390px);
        max-width: 100%;
        height: 100%;
        max-height: 100%;
        border-radius: 30px;
        border: 1px solid color-mix(in srgb, var(--text) 9%, transparent);
        box-shadow: 0 24px 52px rgba(2, 6, 23, 0.34);
      }

      .shell[data-preview="widget"] .header {
        padding: 18px 18px 14px;
      }

      .shell[data-preview="widget"] .header p {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .shell[data-preview="widget"] .messages {
        overflow: hidden;
        padding: 16px 16px 10px;
        gap: 10px;
      }

      .shell[data-preview="widget"] .proactive-tip,
      .shell[data-preview="launcher"] .proactive-tip {
        display: none !important;
      }

      .widget {
        width: 100%;
        height: 100%;
        border-radius: 28px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background:
          radial-gradient(circle at top right, rgba(139, 92, 246, 0.2), transparent 34%),
          radial-gradient(circle at top left, rgba(99, 102, 241, 0.18), transparent 30%),
          var(--panel);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        overscroll-behavior: contain;
      }

      .launcher {
        min-width: 224px;
        max-width: min(380px, calc(100vw - 12px));
        min-height: 96px;
        border-radius: 32px;
        border: 1px solid rgba(248, 250, 252, 0.14);
        background:
          linear-gradient(135deg, color-mix(in srgb, var(--accent) 94%, white 6%), color-mix(in srgb, var(--accent-alt) 94%, white 6%)),
          rgba(15, 23, 42, 0.92);
        color: var(--accent-text);
        font-weight: 700;
        cursor: pointer;
        box-shadow:
          0 20px 46px color-mix(in srgb, var(--accent) 26%, transparent),
          inset 0 1px 0 rgba(255, 255, 255, 0.18);
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        padding: 14px 16px;
        text-align: left;
        backdrop-filter: blur(18px);
        overflow: hidden;
      }

      .launcher[data-shape="rounded"] {
        border-radius: 26px;
        min-height: 96px;
      }

      .launcher[data-shape="compact"] {
        min-width: 176px;
        min-height: 76px;
        border-radius: 24px;
        padding: 12px 14px;
        gap: 10px;
      }

      .launcher[data-shape="compact"] .launcher__mark {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        font-size: 0.92rem;
      }

      .launcher[data-shape="compact"] .launcher__label {
        font-size: 0.9rem;
      }

      .launcher[data-button-style="glass"] {
        background:
          linear-gradient(180deg, rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.72)),
          color-mix(in srgb, var(--accent) 20%, rgba(15, 23, 42, 0.82));
        box-shadow:
          0 20px 44px rgba(2, 6, 23, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.14);
      }

      .launcher[data-button-style="outline"] {
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid color-mix(in srgb, var(--accent) 44%, rgba(248, 250, 252, 0.22));
        box-shadow: 0 18px 40px color-mix(in srgb, var(--accent) 14%, transparent);
      }

      .launcher__mark {
        width: 52px;
        height: 52px;
        border-radius: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(15, 23, 42, 0.22);
        color: var(--accent-text);
        font-family: "Outfit", "Manrope", sans-serif;
        font-size: 1.05rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
        flex-shrink: 0;
      }

      .launcher__mark img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 18px;
      }

      .launcher__copy {
        display: grid;
        gap: 3px;
        min-width: 0;
        flex: 1;
      }

      .launcher__eyebrow {
        font-size: 0.62rem;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--accent-text) 72%, transparent);
      }

      .launcher__label {
        font-family: "Outfit", "Manrope", sans-serif;
        font-size: 0.98rem;
        letter-spacing: -0.02em;
        color: var(--accent-text);
        line-height: 1.12;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .hidden {
        display: none !important;
      }

      .proactive-tip {
        position: absolute;
        bottom: 108px;
        right: 0;
        background: rgba(15, 23, 42, 0.92);
        color: var(--text);
        border-radius: 12px 12px 2px 12px;
        padding: 10px 14px;
        font-size: 0.85rem;
        font-weight: 500;
        max-width: 200px;
        border: 1px solid var(--border-strong);
        box-shadow: 0 8px 24px rgba(0,0,0,0.26);
        line-height: 1.4;
        animation: fadeIn 0.3s ease;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .header {
        padding: 18px 18px 14px;
        background:
          linear-gradient(180deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.76)),
          linear-gradient(135deg, rgba(99, 102, 241, 0.12), rgba(139, 92, 246, 0.12));
        color: #f7fbff;
        border-bottom: 1px solid var(--border);
      }

      .header__top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .header h1 {
        margin: 0 0 6px;
        font-family: "Outfit", "Manrope", sans-serif;
        font-size: 1.18rem;
        letter-spacing: -0.02em;
      }

      .header p {
        margin: 0;
        font-size: 0.88rem;
        color: rgba(247, 251, 255, 0.78);
      }

      .icon-button {
        border: 0;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
        width: 42px;
        height: 42px;
        cursor: pointer;
        font-size: 1.05rem;
        font-weight: 800;
      }

      .header__logo {
        height: 26px;
        width: auto;
        object-fit: contain;
        border-radius: 6px;
        border: 1px solid rgba(248, 250, 252, 0.1);
        background: rgba(255, 255, 255, 0.04);
        padding: 3px;
        margin-bottom: 8px;
      }

      .body {
        flex: 1;
        min-height: 0;
        background:
          radial-gradient(circle at top, rgba(99, 102, 241, 0.12), transparent 32%),
          radial-gradient(circle at top right, rgba(139, 92, 246, 0.1), transparent 28%),
          radial-gradient(circle, rgba(148, 163, 184, 0.18) 1px, transparent 1px) center / 24px 24px,
          var(--panel-soft);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        overscroll-behavior: contain;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 16px 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
      }

      .bubble {
        max-width: 84%;
        padding: 12px 14px;
        border-radius: 18px;
        font-size: 0.9rem;
        line-height: 1.44;
        white-space: pre-wrap;
      }

      .bubble.bot {
        background: rgba(15, 23, 42, 0.92);
        color: var(--text);
        border: 1px solid var(--border);
        align-self: flex-start;
      }

      .bubble.user {
        background: linear-gradient(135deg, var(--accent), var(--accent-alt));
        color: #ffffff;
        align-self: flex-end;
      }

      .citations,
      .lead-card,
      .starters {
        padding-left: 16px;
        padding-right: 16px;
      }

      .citations {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding-top: 2px;
        padding-bottom: 8px;
      }

      .citation,
      .lead-card button,
      .form button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 14px;
        border: 1px solid rgba(248, 250, 252, 0.1);
        background: rgba(15, 23, 42, 0.86);
        padding: 10px 12px;
        text-decoration: none;
        color: var(--text);
        font-size: 0.86rem;
        cursor: pointer;
      }

      .starters {
        display: flex;
        flex-wrap: nowrap;
        gap: 10px;
        overflow-x: auto;
        overflow-y: hidden;
        padding-top: 2px;
        padding-bottom: 14px;
        scrollbar-width: none;
        overscroll-behavior-x: contain;
        -webkit-overflow-scrolling: touch;
      }

      .starters:empty {
        display: none;
      }

      .starter {
        flex: 0 0 auto;
        max-width: min(208px, calc(100% - 40px));
        min-width: 140px;
        min-height: 42px;
        align-items: center;
        justify-content: flex-start;
        padding: 10px 12px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.88);
        border: 1px solid color-mix(in srgb, var(--text) 10%, transparent);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          0 10px 20px rgba(2, 6, 23, 0.16);
        text-align: left;
      }

      .starter--contextual {
        background: rgba(30, 41, 59, 0.72);
        border-color: color-mix(in srgb, var(--accent) 26%, rgba(248, 250, 252, 0.08));
      }

      .starter__copy {
        display: -webkit-box;
        overflow: hidden;
        text-overflow: ellipsis;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        font-size: 0.77rem;
        font-weight: 600;
        line-height: 1.25;
        color: var(--text);
      }

      .lead-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding-top: 2px;
        padding-bottom: 14px;
      }

      .lead-card__intro {
        font-size: 0.8rem;
        line-height: 1.35;
        color: var(--muted);
      }

      .lead-card__actions,
      .form__row {
        display: flex;
        gap: 8px;
      }

      .lead-card__actions a {
        flex: 1;
        text-align: center;
        text-decoration: none;
        border-radius: 14px;
        padding: 12px 14px;
        background: linear-gradient(135deg, var(--accent), var(--accent-alt));
        color: #ffffff;
        font-weight: 600;
      }

      .widget[data-button-style="glass"] .lead-card button,
      .widget[data-button-style="glass"] .form button,
      .widget[data-button-style="glass"] .lead-card__actions a {
        background: rgba(15, 23, 42, 0.78);
        border: 1px solid rgba(248, 250, 252, 0.16);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .widget[data-button-style="outline"] .lead-card button,
      .widget[data-button-style="outline"] .form button,
      .widget[data-button-style="outline"] .lead-card__actions a {
        background: transparent;
        border: 1px solid color-mix(in srgb, var(--accent) 48%, rgba(248, 250, 252, 0.22));
        color: var(--text);
        box-shadow: none;
      }

      .widget[data-button-style="outline"] .lead-card__actions a.secondary {
        border-color: rgba(248, 250, 252, 0.14);
      }

      .lead-card__actions a.secondary {
        background: rgba(15, 23, 42, 0.86);
        border: 1px solid rgba(248, 250, 252, 0.1);
        color: var(--text);
      }

      .lead-card__actions button {
        flex: 1;
      }

      #handover-btn.handover--sent {
        opacity: 0.55;
        cursor: default;
      }

      .form {
        padding: 0 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .form input,
      .form textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 11px 12px;
        font: inherit;
        background: rgba(15, 23, 42, 0.82);
        color: var(--text);
      }

      .composer {
        padding: 14px 16px 16px;
        display: grid;
        gap: 10px;
        background: rgba(15, 23, 42, 0.92);
        border-top: 1px solid var(--border);
      }

      .composer__row {
        display: flex;
        gap: 10px;
      }

      .composer textarea {
        flex: 1;
        min-height: 56px;
        max-height: 132px;
        resize: vertical;
        border-radius: 18px;
        border: 1px solid var(--border);
        padding: 14px 16px;
        font: inherit;
        background: rgba(30, 41, 59, 0.74);
        color: var(--text);
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }

      .composer textarea:disabled,
      .composer button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .composer button,
      .form button {
        background: linear-gradient(135deg, var(--accent), var(--accent-alt));
        color: var(--accent-text);
        border: 0;
        font-weight: 700;
        min-width: 132px;
        min-height: 56px;
        padding: 0 24px;
        border-radius: 18px;
        box-shadow: 0 16px 36px color-mix(in srgb, var(--accent) 20%, transparent);
      }

      .status {
        font-size: 0.82rem;
        color: var(--muted);
      }

      body,
      .messages {
        scrollbar-width: thin;
        scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
      }

      body::-webkit-scrollbar,
      .messages::-webkit-scrollbar,
      .starters::-webkit-scrollbar {
        width: 12px;
        height: 10px;
      }

      .starters::-webkit-scrollbar {
        display: none;
      }

      body::-webkit-scrollbar-track,
      .messages::-webkit-scrollbar-track,
      .starters::-webkit-scrollbar-track {
        background: var(--scrollbar-track);
        border-radius: 999px;
      }

      body::-webkit-scrollbar-thumb,
      .messages::-webkit-scrollbar-thumb,
      .starters::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, var(--scrollbar-thumb), rgba(99, 102, 241, 0.46));
        border: 2px solid transparent;
        border-radius: 999px;
        background-clip: padding-box;
      }

      @media (max-width: 640px) {
        .widget {
          border-radius: 24px;
        }

        .launcher {
          max-width: min(360px, calc(100vw - 12px));
          padding: 12px 14px;
        }

        .bubble {
          max-width: 94%;
        }

        .lead-card__actions,
        .form__row,
        .composer__row {
          flex-direction: column;
        }

        .messages {
          padding: 14px 14px 8px;
        }

        .starters {
          padding-left: 14px;
          padding-right: 14px;
          padding-bottom: 12px;
        }

        .composer button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div id="proactive-tip" class="proactive-tip hidden"></div>
      <button id="launcher" class="launcher" type="button" data-shape="pill">
        <span id="launcher-mark" class="launcher__mark">AI</span>
        <span class="launcher__copy">
          <span id="launcher-eyebrow" class="launcher__eyebrow">Talkaris</span>
          <span id="launcher-label" class="launcher__label">Hablar ahora</span>
        </span>
      </button>
      <section id="widget" class="widget hidden" aria-live="polite" data-button-style="solid">
        <header class="header">
          <div class="header__top">
            <div>
              <h1 id="bot-name">Asistente</h1>
              <p id="bot-copy">Consultas sobre la plataforma, integraciones y acceso.</p>
            </div>
            <button id="close" class="icon-button" type="button" aria-label="Cerrar">X</button>
          </div>
        </header>
        <div class="body">
          <div id="messages" class="messages"></div>
          <div id="citations" class="citations hidden"></div>
          <div id="starters" class="starters"></div>
          <div id="lead-card" class="lead-card hidden">
            <div id="lead-intro" class="lead-card__intro">Podemos llevar esto al siguiente paso cuando tenga sentido.</div>
            <div class="lead-card__actions">
              <a id="primary-cta" href="/solicitar-demo" target="_top" rel="noopener">Solicitar demo</a>
              <a id="secondary-cta" class="hidden secondary" href="#" target="_top" rel="noopener"></a>
              <button id="show-form" type="button">Dejar datos</button>
              <button id="handover-btn" type="button" class="hidden">Hablar con persona</button>
            </div>
          </div>
          <form id="lead-form" class="form hidden">
            <div class="form__row">
              <input id="lead-name" type="text" placeholder="Nombre" required />
              <input id="lead-email" type="email" placeholder="Email" required />
            </div>
            <input id="lead-company" type="text" placeholder="Empresa (opcional)" />
            <textarea id="lead-need" placeholder="Que necesitas y en que contexto" rows="3" required></textarea>
            <button type="submit">Enviar</button>
          </form>
        </div>
        <div class="composer">
          <div class="status" id="status">Ready to help.</div>
          <div class="composer__row">
            <textarea id="composer" placeholder="Ask about the platform, integrations, governance or demo access."></textarea>
            <button id="send" type="button">Enviar</button>
          </div>
        </div>
      </section>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const apiBase = params.get("apiBase");
      const siteKey = params.get("siteKey");
      const parentOrigin = params.get("origin") || "*";
      const entryContext = params.get("entryContext") || "";
      const previewMode = params.get("previewMode") || "";
      const brandLabel = params.get("brandLabel") || "la plataforma";
      const sourceSite = params.get("sourceSite") || parentOrigin;
      const contactUrl = params.get("contactUrl");
      const isMarketingEn = entryContext === "marketing-en";
      const isMarketingEs = entryContext === "marketing-es";
      const isMarketingContext = isMarketingEn || isMarketingEs || entryContext === "auctorio-marketing";
      const isPreviewWidget = previewMode === "widget";
      const isPreviewLauncher = previewMode === "launcher";
      const isStudioPreview = isPreviewWidget || isPreviewLauncher;
      let fallbackContactUrl = contactUrl
        || "https://talkaris.com/solicitar-demo";
      const defaultBotCopy = isMarketingEn
        ? "Assistant for the platform, integrations and commercial contact."
        : isMarketingEs
          ? "Asistente sobre la plataforma, sus integraciones y el acceso comercial."
          : "Consultas sobre la plataforma, integraciones y acceso.";
      const defaultWelcomeMessage = isMarketingEn
        ? `Hello. I am the assistant for ${brandLabel}. I can help you understand the platform, its integrations and how to request a demo.`
        : isMarketingEs
          ? `Hola. Soy el asistente de ${brandLabel}. Puedo ayudarte a entender la plataforma, sus integraciones y cómo solicitar una demo.`
          : "Hola. ¿En qué puedo ayudarte?";
      const marketingStarterQuestions = isMarketingEn
        ? [
          "What does Talkaris do exactly",
          "How does the widget integrate into a product",
          "How does multi-tenant governance work",
          "I want a demo or to speak with sales",
        ]
        : isMarketingEs
          ? [
            "Qué hace Talkaris exactamente",
            "Cómo se integra el widget en un producto",
            "Cómo funciona el gobierno multi-tenant",
            "Quiero una demo o hablar con ventas",
          ]
          : [
            "Qué hace Talkaris exactamente",
            "Cómo se integra en otras aplicaciones",
            "Cómo se administra un tenant",
            "Quiero una demo o hablar con ventas",
          ];

      let expanded = false;
      let config = null;
      let conversationId = null;
      let lastUserMessage = "";
      let degradedMode = false;
      let hasUserInteracted = false;

      const launcher = document.getElementById("launcher");
      const widget = document.getElementById("widget");
      const shell = document.querySelector(".shell");
      const closeButton = document.getElementById("close");
      const messages = document.getElementById("messages");
      const citations = document.getElementById("citations");
      const starters = document.getElementById("starters");
      const status = document.getElementById("status");
      const composer = document.getElementById("composer");
      const sendButton = document.getElementById("send");
      const leadCard = document.getElementById("lead-card");
      const leadIntro = document.getElementById("lead-intro");
      const primaryCta = document.getElementById("primary-cta");
      const secondaryCta = document.getElementById("secondary-cta");
      const showFormButton = document.getElementById("show-form");
      const handoverBtn = document.getElementById("handover-btn");
      const leadForm = document.getElementById("lead-form");
      const botName = document.getElementById("bot-name");
      const botCopy = document.getElementById("bot-copy");
      const launcherMark = document.getElementById("launcher-mark");
      const launcherEyebrow = document.getElementById("launcher-eyebrow");
      const launcherLabel = document.getElementById("launcher-label");

      if (shell) {
        shell.dataset.preview = isPreviewWidget ? "widget" : isPreviewLauncher ? "launcher" : "runtime";
      }

      function notifyParent() {
        if (isStudioPreview) {
          return;
        }
        const emit = () => {
          window.parent.postMessage(
            { type: "talkaris-chat:toggle", expanded },
            "*"
          );
        };
        emit();
        window.setTimeout(emit, 40);
        window.setTimeout(emit, 140);
        window.setTimeout(emit, 320);
        window.setTimeout(emit, 640);
      }

      function notifyLauncherSize(width, height) {
        if (isStudioPreview) {
          return;
        }
        const emit = () => {
          window.parent.postMessage(
            { type: "talkaris-chat:launcher", width, height },
            "*"
          );
        };
        emit();
        window.setTimeout(emit, 40);
        window.setTimeout(emit, 160);
      }

      function bindRuntimeScroll() {
        const handleWheel = (event) => {
          if (!expanded || !widget || !messages) {
            return;
          }

          const target = event.target;
          if (!(target instanceof Element)) {
            return;
          }

          if (target.closest("textarea, input, .starters")) {
            return;
          }

          if (messages.scrollHeight <= messages.clientHeight + 1) {
            return;
          }

          event.preventDefault();
          messages.scrollTop += event.deltaY;
        };

        widget.addEventListener("wheel", handleWheel, { passive: false });
      }

      function setExpanded(nextValue) {
        expanded = nextValue;
        launcher.classList.toggle("hidden", expanded);
        widget.classList.toggle("hidden", !expanded);
        notifyParent();
      }

      function addBubble(role, text) {
        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        bubble.textContent = text;
        messages.appendChild(bubble);
        messages.scrollTop = messages.scrollHeight;
      }

      function setStatus(text) {
        status.textContent = text;
      }

      function setComposerEnabled(enabled) {
        composer.disabled = !enabled;
        sendButton.disabled = !enabled;
      }

      function setLeadCta(label, url, allowLeadForm, secondaryLabel, secondaryUrl, introText) {
        primaryCta.textContent = label;
        primaryCta.href = url;
        if (leadIntro) {
          leadIntro.textContent = introText
            || "Podemos llevar esto al siguiente paso cuando tenga sentido.";
        }
        if (secondaryLabel && secondaryUrl) {
          secondaryCta.textContent = secondaryLabel;
          secondaryCta.href = secondaryUrl;
          secondaryCta.classList.remove("hidden");
        } else {
          secondaryCta.textContent = "";
          secondaryCta.href = "#";
          secondaryCta.classList.add("hidden");
        }
        leadCard.classList.remove("hidden");
        showFormButton.classList.toggle("hidden", !allowLeadForm);
        if (!allowLeadForm) {
          leadForm.classList.add("hidden");
        }
      }

      function renderSuggestionTray(items, options = {}) {
        starters.innerHTML = "";
        const visible = Array.isArray(items) ? items.filter(Boolean) : [];
        if (!visible.length) {
          return;
        }

        visible.forEach((item) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `starter ${options.contextual ? "starter--contextual" : ""}`.trim();
          button.title = item.prompt || item.label || "";
          const copy = document.createElement("span");
          copy.className = "starter__copy";
          copy.textContent = item.label || item.prompt || "";
          button.appendChild(copy);
          button.addEventListener("click", () => sendMessage(item.prompt || item.label || ""));
          starters.appendChild(button);
        });
      }

      function clearTransientBlocks() {
        starters.innerHTML = "";
        citations.innerHTML = "";
        citations.classList.add("hidden");
        leadCard.classList.add("hidden");
        leadForm.classList.add("hidden");
      }

      function parseHexColor(value) {
        if (!value || typeof value !== "string") {
          return null;
        }

        const normalized = value.trim().replace(/^#/, "");
        if (/^[0-9a-f]{3}$/i.test(normalized)) {
          return {
            r: Number.parseInt(normalized[0] + normalized[0], 16),
            g: Number.parseInt(normalized[1] + normalized[1], 16),
            b: Number.parseInt(normalized[2] + normalized[2], 16),
          };
        }

        if (/^[0-9a-f]{6}$/i.test(normalized)) {
          return {
            r: Number.parseInt(normalized.slice(0, 2), 16),
            g: Number.parseInt(normalized.slice(2, 4), 16),
            b: Number.parseInt(normalized.slice(4, 6), 16),
          };
        }

        return null;
      }

      function rgbToHex(color) {
        return `#${[color.r, color.g, color.b].map((value) => value.toString(16).padStart(2, "0")).join("")}`;
      }

      function rgba(color, alpha) {
        return `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`;
      }

      function blendColor(base, target, amount) {
        return {
          r: Math.round(base.r + ((target.r - base.r) * amount)),
          g: Math.round(base.g + ((target.g - base.g) * amount)),
          b: Math.round(base.b + ((target.b - base.b) * amount)),
        };
      }

      function luminance(color) {
        const channels = [color.r, color.g, color.b].map((value) => {
          const normalized = value / 255;
          return normalized <= 0.03928
            ? normalized / 12.92
            : ((normalized + 0.055) / 1.055) ** 2.4;
        });

        return (0.2126 * channels[0]) + (0.7152 * channels[1]) + (0.0722 * channels[2]);
      }

      function contrastRatio(foreground, background) {
        const light = Math.max(luminance(foreground), luminance(background));
        const dark = Math.min(luminance(foreground), luminance(background));
        return (light + 0.05) / (dark + 0.05);
      }

      function ensureReadableTextColor(input, surface, minimumContrast = 4.5) {
        const fallbackLight = { r: 248, g: 250, b: 252 };
        const fallbackDark = { r: 15, g: 23, b: 42 };
        const background = parseHexColor(surface) || fallbackDark;
        const configured = parseHexColor(input) || fallbackLight;

        if (contrastRatio(configured, background) >= minimumContrast) {
          return configured;
        }

        const target = luminance(background) < 0.36 ? fallbackLight : fallbackDark;
        for (let step = 0.18; step <= 1; step += 0.12) {
          const candidate = blendColor(configured, target, step);
          if (contrastRatio(candidate, background) >= minimumContrast) {
            return candidate;
          }
        }

        return target;
      }

      function resetRuntimeSurface() {
        clearTransientBlocks();
        messages.innerHTML = "";
        handoverBtn.classList.add("hidden");
        handoverBtn.classList.remove("handover--sent");
        handoverBtn.disabled = false;
        handoverBtn.textContent = "Hablar con persona";
        hasUserInteracted = false;
        botName.parentElement.querySelectorAll(".header__logo").forEach((item) => item.remove());
      }

      function resolvedLauncherLabel(nextConfig) {
        if (nextConfig?.theme?.launcherLabel) {
          return nextConfig.theme.launcherLabel;
        }
        if (isMarketingContext) {
          return isMarketingEn ? "Talkaris AI" : "Hablar con IA";
        }
        const isSpanish = isSpanishRuntime(nextConfig);
        const runtimeLabel = nextConfig?.botName || brandLabel;
        return runtimeLabel && runtimeLabel !== "la plataforma"
          ? (isSpanish ? `Hablar con ${runtimeLabel}` : `Talk to ${runtimeLabel}`)
          : (isSpanish ? "Hablar ahora" : "Talk now");
      }

      function resolvedLauncherEyebrow(nextConfig) {
        if (nextConfig?.theme?.launcherEyebrow) {
          return nextConfig.theme.launcherEyebrow;
        }
        const label = nextConfig?.botName || brandLabel || "Talkaris";
        if (isMarketingContext) {
          return "AI Copilot";
        }
        if (label.length > 18) {
          return isSpanishRuntime(nextConfig) ? "Asistente" : "Assistant";
        }
        return label;
      }

      function applyLauncherVisual(nextConfig) {
        const label = resolvedLauncherLabel(nextConfig);
        const eyebrow = resolvedLauncherEyebrow(nextConfig);
        const configuredIcon = (nextConfig?.theme?.launcherIcon || "").trim();
        const markText = configuredIcon || ((nextConfig?.botName || brandLabel || "AI").trim()[0] || "AI").toUpperCase();
        const shape = nextConfig?.theme?.launcherShape || "pill";
        const buttonStyle = nextConfig?.theme?.buttonStyle || "solid";
        const width = shape === "compact"
          ? Math.max(176, Math.min(300, Math.round(label.length * 8 + 104)))
          : Math.max(236, Math.min(380, Math.round(label.length * 9.1 + 154)));
        const height = shape === "compact" ? 76 : 96;
        const resolvedAccentColor = nextConfig?.theme?.accentColor || "#6366f1";
        const resolvedSurfaceColor = nextConfig?.theme?.surfaceColor || "#0f172a";
        const configuredTextColor = nextConfig?.theme?.textColor || "#f8fafc";
        const resolvedTextColor = ensureReadableTextColor(configuredTextColor, resolvedSurfaceColor, 6.6);
        const resolvedAccentTextColor = ensureReadableTextColor(configuredTextColor, resolvedAccentColor, 4.5);

        document.documentElement.style.setProperty(
          "--accent",
          resolvedAccentColor
        );
        document.documentElement.style.setProperty(
          "--accent-alt",
          nextConfig?.theme?.presetKey === "midnight"
            ? "#475569"
            : nextConfig?.theme?.presetKey === "violet"
              ? "#7c3aed"
              : nextConfig?.theme?.presetKey === "aurora"
                ? "#8b5cf6"
                : "#4f46e5"
        );
        document.documentElement.style.setProperty(
          "--surface",
          resolvedSurfaceColor
        );
        document.documentElement.style.setProperty(
          "--text",
          rgbToHex(resolvedTextColor)
        );
        document.documentElement.style.setProperty(
          "--accent-text",
          rgbToHex(resolvedAccentTextColor)
        );
        document.documentElement.style.setProperty("--muted", rgba(resolvedTextColor, 0.64));
        document.documentElement.style.setProperty("--border", rgba(resolvedTextColor, 0.1));
        document.documentElement.style.setProperty("--border-strong", rgba(resolvedTextColor, 0.16));

        launcher.dataset.shape = shape;
        launcher.dataset.buttonStyle = buttonStyle;
        widget.dataset.buttonStyle = nextConfig?.theme?.buttonStyle || "solid";
        launcherLabel.textContent = label;
        launcherEyebrow.textContent = eyebrow;
        launcher.style.width = `${width}px`;
        launcher.style.height = `${height}px`;

        if (nextConfig?.theme?.logoUrl) {
          launcherMark.replaceChildren();
          const img = document.createElement("img");
          img.src = nextConfig.theme.logoUrl;
          img.alt = eyebrow;
          launcherMark.appendChild(img);
        } else {
          launcherMark.replaceChildren();
          launcherMark.textContent = markText;
        }

        notifyLauncherSize(`${width}px`, `${height}px`);
      }

      function isSpanishRuntime(nextConfig) {
        const welcome = (nextConfig?.welcomeMessage || "").toLowerCase();
        const copy = (nextConfig?.theme?.botCopy || "").toLowerCase();
        return /^es/i.test(navigator.language || "") || /hola|puedo ayudarte|servicios|contacto/.test(`${welcome} ${copy}`);
      }

      function deriveStarterQuestions(nextConfig) {
        if (Array.isArray(nextConfig?.starterQuestions) && nextConfig.starterQuestions.length) {
          return nextConfig.starterQuestions;
        }

        if (Array.isArray(nextConfig?.assistantProfile?.servicePromptLibrary) && nextConfig.assistantProfile.servicePromptLibrary.length) {
          return nextConfig.assistantProfile.servicePromptLibrary;
        }

        const label = nextConfig?.botName || brandLabel || "el asistente";
        if (isSpanishRuntime(nextConfig)) {
          return [
            `¿Qué hace ${label} exactamente?`,
            `¿Qué servicios o soluciones ofrece ${label}?`,
            `¿Cómo puede ayudarme ${label} en mi caso?`,
            `Quiero hablar con el equipo de ${label}`,
          ];
        }

        return [
          `What does ${label} do exactly?`,
          `What services or solutions does ${label} offer?`,
          `How can ${label} help in my case?`,
          `I want to speak with the ${label} team`,
        ];
      }

      function applyRuntimeConfig(nextConfig) {
        config = nextConfig;
        resetRuntimeSurface();
        applyLauncherVisual(nextConfig);

        const resolvedBotName = isMarketingContext
          ? brandLabel
          : (nextConfig.botName || brandLabel || "Asistente");
        const resolvedBotCopy = isMarketingContext
          ? defaultBotCopy
          : (nextConfig.theme?.botCopy || defaultBotCopy);
        const resolvedWelcomeMessage = isMarketingContext
          ? defaultWelcomeMessage
          : (nextConfig.welcomeMessage || defaultWelcomeMessage);
        const resolvedStarterQuestions = isMarketingContext
          ? marketingStarterQuestions
          : deriveStarterQuestions(nextConfig);
        const runtimePolicy = nextConfig.runtimePolicy || {};
        const maxSuggestionSlots = window.innerWidth <= 640
          ? Math.min(2, Number(runtimePolicy.maxMobileSuggestions) || 2)
          : Math.min(3, Number(runtimePolicy.maxDesktopSuggestions) || 3);
        const visibleStarterQuestions = resolvedStarterQuestions.slice(0, maxSuggestionSlots);
        const resolvedComposerPlaceholder = nextConfig.theme?.composerPlaceholder
          || (isMarketingEn
            ? "Ask about the product, integrations or support."
            : "Pregunta sobre el producto, integraciones o soporte.");
        const resolvedSendButtonLabel = nextConfig.theme?.sendButtonLabel
          || (isMarketingEn ? "Send" : "Enviar");

        botName.textContent = resolvedBotName;
        botCopy.textContent = resolvedBotCopy;
        composer.placeholder = resolvedComposerPlaceholder;
        sendButton.textContent = resolvedSendButtonLabel;
        addBubble("bot", resolvedWelcomeMessage);

        if (!runtimePolicy.hideStartersAfterFirstUserMessage || !hasUserInteracted) {
          renderSuggestionTray(
            visibleStarterQuestions.map((question) => ({
              label: question,
              prompt: question,
            }))
          );
        }

        setLeadCta(
          nextConfig.cta?.primaryLabel || "Request demo",
          nextConfig.cta?.primaryUrl || fallbackContactUrl,
          true,
          nextConfig.cta?.secondaryLabel,
          nextConfig.cta?.secondaryUrl,
          isMarketingEn
            ? "Use the next step that fits your buying motion."
            : "Usa el siguiente paso que mejor encaje con tu proceso."
        );
        leadCard.classList.add("hidden");

        primaryCta.onclick = () => {
          logEvent("cta_clicked", { url: primaryCta.href, slot: "primary" });
        };
        secondaryCta.onclick = () => {
          if (!secondaryCta.classList.contains("hidden")) {
            logEvent("cta_clicked", { url: secondaryCta.href, slot: "secondary" });
          }
        };

        if (nextConfig.enableHandover) {
          handoverBtn.classList.remove("hidden");
          handoverBtn.onclick = requestHandover;
        } else {
          handoverBtn.classList.add("hidden");
          handoverBtn.onclick = null;
        }

        if (nextConfig.theme?.logoUrl) {
          const img = document.createElement("img");
          img.src = nextConfig.theme.logoUrl;
          img.alt = "Logo";
          img.className = "header__logo";
          botName.parentElement.insertBefore(img, botName);
        }

        if (nextConfig.theme?.removeBranding) {
          fallbackContactUrl = nextConfig.cta?.primaryUrl || "#";
        }

        if (isPreviewWidget) {
          expanded = true;
          launcher.classList.add("hidden");
          widget.classList.remove("hidden");
        }
        if (isPreviewLauncher) {
          expanded = false;
          launcher.classList.remove("hidden");
          widget.classList.add("hidden");
        }
      }

      function enableDegradedMode(message) {
        if (degradedMode) {
          setStatus("Asistente no disponible.");
          return;
        }

        degradedMode = true;
        clearTransientBlocks();
        setComposerEnabled(false);
        setLeadCta("Request demo", fallbackContactUrl, false);
        botName.textContent = brandLabel;
        botCopy.textContent = defaultBotCopy;
        addBubble("bot", message);
        setStatus("Assistant unavailable.");
      }

      function ensureConfigured() {
        if (!apiBase || !siteKey) {
          throw new Error("Widget configuration is incomplete.");
        }
      }

      async function fetchJson(url) {
        const response = await fetch(url);
        const text = await response.text();
        const body = text ? JSON.parse(text) : null;
        if (!response.ok) {
          throw new Error(body?.message || `${response.status} ${response.statusText}`);
        }
        return body;
      }

      async function postJson(path, payload) {
        ensureConfigured();
        const response = await fetch(`${apiBase}${path}`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });
        const text = await response.text();
        if (!response.ok) {
          let message = `${response.status} ${response.statusText}`;
          if (text) {
            try {
              const body = JSON.parse(text);
              message = body?.message || body?.code || message;
            } catch {
              message = text;
            }
          }
          throw new Error(message);
        }
        return text;
      }

      async function ensureSession() {
        if (conversationId || degradedMode) {
          return;
        }

        ensureConfigured();
        const text = await postJson("/v1/widget/sessions", {
          siteKey,
          origin: parentOrigin,
          detectedLanguage: (navigator.language || "").slice(0, 2) || null,
        });
        const data = text ? JSON.parse(text) : null;
        conversationId = data?.conversationId || null;
        if (!conversationId) {
          throw new Error("Session could not be created.");
        }
      }

      async function logEvent(eventType, payload) {
        if (!conversationId || degradedMode) {
          return;
        }

        try {
          await postJson("/v1/widget/events", {
            conversationId,
            eventType,
            payload,
          });
        } catch {
          // no-op
        }
      }

      function renderCitations(items) {
        citations.innerHTML = "";
        if (!items?.length) {
          citations.classList.add("hidden");
          return;
        }

        citations.classList.remove("hidden");
        items.forEach((item) => {
          const link = document.createElement("a");
          link.className = "citation";
          link.href = item.url;
          link.target = "_top";
          link.rel = "noopener";
          link.textContent = item.title;
          link.addEventListener("click", () => logEvent("citation_clicked", { url: item.url }));
          citations.appendChild(link);
        });
      }

      function maybeShowLead(answer) {
        if (!answer?.cta) {
          leadCard.classList.add("hidden");
          leadForm.classList.add("hidden");
          return;
        }

        setLeadCta(
          answer.cta.label,
          answer.cta.url,
          true,
          config?.cta?.secondaryLabel,
          config?.cta?.secondaryUrl,
          "¿Quieres convertir esta conversación en una reunión, una demo o un siguiente paso comercial claro?"
        );
      }

      function renderSuggestions(answer) {
        const block = answer?.suggestions;
        if (!block?.items?.length) {
          starters.innerHTML = "";
          return;
        }

        const maxItems = window.innerWidth <= 640
          ? Math.min(2, Number(config?.runtimePolicy?.maxMobileSuggestions) || 2)
          : Math.min(3, Number(config?.runtimePolicy?.maxDesktopSuggestions) || 3);
        renderSuggestionTray(
          block.items.slice(0, maxItems).map((item) => ({
            label: item.label || item.prompt,
            prompt: item.prompt || item.label,
          })),
          { contextual: true }
        );
      }

      async function sendMessage(message) {
        const trimmed = message.trim();
        if (!trimmed || degradedMode) {
          return;
        }

        hasUserInteracted = true;
        lastUserMessage = trimmed;
        clearTransientBlocks();
        addBubble("user", trimmed);
        composer.value = "";
        setStatus("Buscando en fuentes autorizadas...");

        try {
          await ensureSession();
          const text = await postJson("/v1/widget/messages", {
            conversationId,
            message: trimmed,
          });
          const payloadLine = text
            .split("\n")
            .find((line) => line.startsWith("data: "));
          const data = payloadLine ? JSON.parse(payloadLine.slice(6)) : null;
          const answer = data?.payload;

          addBubble("bot", answer?.message || "No he podido generar una respuesta valida.");
          renderCitations(answer?.citations || []);
          renderSuggestions(answer || {});
          maybeShowLead(answer || {});
          setStatus(
            answer?.usedFallback
              ? "He derivado a fallback seguro."
              : "Respuesta generada con contexto autorizado."
          );
        } catch (error) {
          addBubble(
            "bot",
            "I cannot answer from the authorised sources right now. You can continue through the form or request a demo."
          );
          setLeadCta("Request demo", fallbackContactUrl, false);
          renderCitations([]);
          setStatus(error instanceof Error ? error.message : "Assistant unavailable.");
        }
      }

      async function submitLead(event) {
        event.preventDefault();
        if (degradedMode) {
          setStatus("Usa el CTA principal para contactar.");
          return;
        }

        try {
          await ensureSession();
          await postJson("/v1/widget/leads", {
            conversationId,
            name: document.getElementById("lead-name").value,
            email: document.getElementById("lead-email").value,
            company: document.getElementById("lead-company").value,
            need: document.getElementById("lead-need").value || lastUserMessage,
          });
          leadForm.classList.add("hidden");
          addBubble(
            "bot",
            "He registrado tu solicitud. El equipo puede revisar el contexto y seguir por el canal adecuado."
          );
          setStatus("Lead enviado.");
        } catch (error) {
          setStatus(
            error instanceof Error
              ? error.message
              : "No he podido enviar los datos. Puedes usar el CTA principal como alternativa."
          );
        }
      }

      async function init() {
        if (degradedMode || launcher.dataset.ready === "true") {
          return;
        }

        ensureConfigured();
        const nextConfig = await fetchJson(`${apiBase}/v1/widget/config/${encodeURIComponent(siteKey)}`);
        applyRuntimeConfig(nextConfig);

        // Proactive bubble
        const proactiveTip = document.getElementById("proactive-tip");
        if (nextConfig.theme?.proactiveMessage && proactiveTip && !expanded) {
          const delay = (nextConfig.theme.proactiveDelaySeconds ?? 8) * 1000;
          setTimeout(() => {
            if (!expanded) {
              proactiveTip.textContent = nextConfig.theme.proactiveMessage;
              proactiveTip.classList.remove("hidden");
              setTimeout(() => proactiveTip.classList.add("hidden"), 8000);
            }
          }, delay);
        }
        launcher.dataset.ready = "true";
      }

      async function primeLauncher() {
        if (isStudioPreview) {
          return;
        }
        if (isMarketingContext) {
          applyLauncherVisual({
            botName: brandLabel || "Talkaris",
            theme: {
              launcherLabel: isMarketingEn ? "Talkaris AI" : "Hablar con IA",
            },
          });
          return;
        }

        try {
          const nextConfig = await fetchJson(`${apiBase}/v1/widget/config/${encodeURIComponent(siteKey)}`);
          config = nextConfig;
          applyLauncherVisual(nextConfig);
        } catch {
          applyLauncherVisual({ botName: brandLabel || "Assistant", theme: {} });
        }
      }

      async function requestHandover() {
        await ensureSession();
        handoverBtn.disabled = true;
        handoverBtn.textContent = "Enviando\u2026";
        try {
          await postJson(`/v1/widget/conversations/${encodeURIComponent(conversationId)}/handover`, {
            reason: "user_requested"
          });
          handoverBtn.textContent = "Solicitud enviada \u2713";
          handoverBtn.classList.add("handover--sent");
          addBubble("bot", "Hemos avisado al equipo. Se pondr\u00e1n en contacto contigo pronto.");
        } catch {
          handoverBtn.disabled = false;
          handoverBtn.textContent = "Hablar con persona";
        }
      }

      launcher.addEventListener("click", async () => {
        if (isStudioPreview) {
          return;
        }
        setExpanded(true);

        try {
          if (!config && !degradedMode) {
            await init();
          }
          if (!degradedMode) {
            await ensureSession();
          }
        } catch {
          enableDegradedMode(
            "The assistant is not available right now. You can request a demo and the team will continue from there."
          );
        }
      });
      closeButton.addEventListener("click", () => setExpanded(false));
      sendButton.addEventListener("click", () => sendMessage(composer.value));
      composer.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage(composer.value);
        }
      });
      showFormButton.addEventListener("click", () => {
        if (degradedMode) {
          return;
        }
        leadForm.classList.toggle("hidden");
        document.getElementById("lead-need").value = lastUserMessage;
      });
      leadForm.addEventListener("submit", submitLead);
      bindRuntimeScroll();
      window.addEventListener("message", (event) => {
        if (!isStudioPreview || !event.data) {
          return;
        }

        if (
          event.origin !== window.location.origin
          && parentOrigin !== "*"
          && event.origin !== parentOrigin
        ) {
          return;
        }

        if (event.data.type === "talkaris-chat:preview-config") {
          applyRuntimeConfig(event.data.config || {});
        }
      });
      applyLauncherVisual({ botName: brandLabel || "Assistant", theme: {} });
      botName.textContent = brandLabel;
      botCopy.textContent = defaultBotCopy;
      composer.placeholder = isMarketingEn
        ? "Ask about the product, integrations or support."
        : "Pregunta sobre el producto, integraciones o soporte.";
      sendButton.textContent = isMarketingEn ? "Send" : "Enviar";
      primaryCta.textContent = "Request demo";
      primaryCta.href = fallbackContactUrl;
      secondaryCta.classList.add("hidden");
      leadCard.classList.add("hidden");
      setComposerEnabled(true);
      if (isPreviewWidget) {
        expanded = true;
        launcher.classList.add("hidden");
        widget.classList.remove("hidden");
      }
      void primeLauncher();
    </script>
  </body>
</html>
